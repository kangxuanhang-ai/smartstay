# HTTPS 443 端口（安全访问，摄像头可用）
server {
    listen 443 ssl;
    server_name 121.199.75.92;

    root /usr/share/nginx/html;
    index index.html;

    # 证书配置
    ssl_certificate /usr/share/nginx/html/cert/certificate.crt;
    ssl_certificate_key /usr/share/nginx/html/cert/private.key;
    ssl_trusted_certificate /usr/share/nginx/html/cert/ca_bundle.crt;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # ZeroSSL 验证
    location /.well-known/pki-validation/ {
        alias /usr/share/nginx/html/.well-known/pki-validation/;
    }

    # SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理
    location /api/ {
        proxy_pass http://backend:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket
    location /ws {
        proxy_pass http://backend:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}

# HTTP 80 端口 → 强制跳转到 HTTPS
server {
    listen 80;
    server_name 121.199.75.92;
    return 301 https://$host$request_uri;
}
